    <title>Shopping List</title>

<body>
    <div class="container">
        <header>
            <div class="logo">
            <img src="./svg123.svg" alt="" />
            </div>
            <h1 id="app-title">Shopping List</h1>
            <a href="https://google.com">google</a>
            <a href="https://youtube.com">youtube</a>
        </header>
        <form id="item-form" >
            <div class="form-control">
                <input type="text" id="item-input" class="form-input" name="item" placeholder="Enter Item">
            </div>
            <!--select input-->
            <!-- <select name="priority" id="priority-input" class="form-input">

            <div class="form-control">
                <button class="btn" type="submit">
                    <i class="fa-solid fa-plus"></i>Add Item
                </button>
            </div>
        </form>
        <div class="filter">
            <input type="text" class="form-input-filter" id="filter" placeholder="Filter Items" />
            <ul id="item-list" class="items parent">
                <li class="item">Apple
                    <button class="remove-item btn-link text-red">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </li>
                <li class="item">Orange
                    <button class="remove-item btn-link text-red">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </li>
                <li class="item">Pear
                    <button class="remove-item btn-link text-red">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </li>
                <li class="item">Banana
                    <button class="remove-item btn-link text-red">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </li>
            </ul>
            <button id="clear" class="btn-clear">Clear all</button>
        </div>
    </div>
